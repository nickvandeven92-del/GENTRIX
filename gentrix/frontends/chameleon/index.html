<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GENTRIX — Webshop</title>
    <meta name="description" content="Webshop (GENTRIX)" />
    <meta name="author" content="GENTRIX" />

    <meta property="og:title" content="GENTRIX — Webshop" />
    <meta property="og:description" content="Webshop (GENTRIX)" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body { background: #ffffff; font-family: system-ui, -apple-system, sans-serif; }
      @media (prefers-color-scheme: dark) { body { background: #09090b; } }

      #root:empty {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: inherit;
      }
      #root:empty::after {
        content: '';
        width: 28px;
        height: 28px;
        border: 2.5px solid #e4e4e7;
        border-top-color: #18181b;
        border-radius: 50%;
        animation: __spin 0.55s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        #root:empty::after {
          border-color: #3f3f46;
          border-top-color: #fafafa;
        }
      }
      @keyframes __spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
